<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 7: Additional details</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3>Step 7 of 9: Any additional details?</h3>
<div class="selected-info">
    Location: <strong th:text="${vehicle.issueLocation}"></strong><br/>
    Symptom: <strong th:text="${vehicle.issueSymptom}"></strong><br/>
    Specific: <strong th:text="${vehicle.issueSpecific}"></strong><br/>
    Severity: <strong th:text="${vehicle.severity}"></strong>
</div>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Symptom</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Specific</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>8</span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>9</span></div>
            <div class="step-label">Complete</div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/details" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">
    <input type="hidden" name="issueSymptom" th:value="${vehicle.issueSymptom}">
    <input type="hidden" name="issueSpecific" th:value="${vehicle.issueSpecific}">
    <input type="hidden" name="severity" th:value="${vehicle.severity}">

    <textarea name="additionalInfo" rows="6" cols="50" placeholder="When did it start? How often does it happen? Any other details you want to share?"></textarea>
    <br/>
    <button type="submit" class="next-btn">Next - Review</button>
</form>

</body>
</html>
