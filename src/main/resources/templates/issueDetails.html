<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Additional Details</title>
    <style>
        textarea {
            padding: 12px;
            width: 100%;
            max-width: 500px;
            height: 150px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            resize: vertical;
            margin: 20px 0;
        }
        .next-btn {
            font-size: 16px;
            padding: 12px 24px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .next-btn:hover {
            background-color: #e0e0e0;
        }
        h3 {
            margin-bottom: 5px;
        }
        hr {
            margin: 15px 0 25px 0;
        }
    </style>
</head>
<body>

<h3>Additional Details (Optional)</h3>
<hr>

<div style="font-family: monospace; font-size: 14px; margin: 15px 0; padding: 8px; background-color: #f5f5f5; border-radius: 4px;">
    [ Customer Info ] --- [ Vehicle Info ] --- [ Structured Diagnosis ] --- [ <span style="color: red; font-weight: bold;">Extra Comments</span> ] --- [ Confirm Submission ] --- [ Complete ]
</div>
<hr>

<form action="/vehicle/issue/details" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">
    <input type="hidden" name="issueType" th:value="${vehicle.issueType}">
    <input type="hidden" name="severity" th:value="${vehicle.severity}">

    <textarea name="additionalInfo" id="additionalInfo" rows="6" cols="50" placeholder="Anything else we should know?"></textarea>
    <br/>
    <button type="submit" class="next-btn">Next</button>
</form>

</body>
</html>
