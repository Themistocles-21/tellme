<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{issue.details.title}">Additional Details</title>
    <style>
        textarea {
            padding: 12px;
            width: 100%;
            max-width: 500px;
            height: 150px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            resize: vertical;
            margin: 20px 0;
        }
        .next-btn {
            font-size: 16px;
            padding: 12px 24px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .next-btn:hover {
            background-color: #e0e0e0;
        }
        h3 {
            margin-bottom: 5px;
        }
        hr {
            margin: 15px 0 25px 0;
        }
    </style>
</head>
<body>

<h3 th:text="#{issue.details.title}">Additional Details
