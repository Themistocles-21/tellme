<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Additional Details</title>
    <style>
        .severity-buttons {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .severity-btn {
            font-size: 18px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .severity-mild { background-color: #4CAF50; color: white; }
        .severity-moderate { background-color: #FFC107; color: black; }
        .severity-severe { background-color: #FF9800; color: white; }
        .severity-emergency { background-color: #f44336; color: white; }
        .severity-btn:hover { opacity: 0.85; transform: scale(1.02); }
        textarea {
            padding: 10px;
            width: 100%;
            max-width: 500px;
            font-size: 14px;
            margin: 10px 0;
        }
        .next-btn {
            font-size: 18px;
            padding: 12px 30px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        .next-btn:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>

<h3>Additional Details (Optional)</h3>
<hr>

<form action="/vehicle/issue/details" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">
    <input type="hidden" name="issueType" th:value="${vehicle.issueType}">

    <p><strong>Severity:</strong></p>
    <div class="severity-buttons">
        <button type="submit" name="severity" value="mild" class="severity-btn severity-mild">🟢 Mild</button>
        <button type="submit" name="severity" value="moderate" class="severity-btn severity-moderate">🟡 Moderate</button>
        <button type="submit" name="severity" value="severe" class="severity-btn severity-severe">🟠 Severe</button>
        <button type="submit" name="severity" value="emergency" class="severity-btn severity-emergency">🔴 Emergency</button>
    </div>

    <br/>
    <label for="additionalInfo"><strong>Additional Information (Optional):</strong></label><br/>
    <textarea name="additionalInfo" id="additionalInfo" rows="4" cols="50" placeholder="Anything else we should know..."></textarea>

    <br/>
    <button type="submit" class="next-btn">Next ➡️</button>
</form>

</body>
</html>
