<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Issue Type</title>
    <style>
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 20px 0;
        }
        .type-btn {
            font-size: 16px;
            padding: 12px 24px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .type-btn:hover {
            background-color: #e0e0e0;
        }
        .system-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
        hr {
            margin: 15px 0 25px 0;
        }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h3>What specific issue are you having?</h3>
<div class="system-info">
    System: <strong th:text="${vehicle.getSystemDisplayName(vehicle.issueLocation)}"></strong>
</div>
<hr>

<div class="progress-bar">
    [ Customer Info ] --- [ Vehicle Info ] --- [ Diagnosis 4/4 ] --- [ Details ] --- [ Confirm ] --- [ Complete ]
</div>
<hr>

<form action="/vehicle/issue/type" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueZone" th:value="${vehicle.issueZone}">
    <input type="hidden" name="issueSubLocation" th:value="${vehicle.issueSubLocation}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">

    <div class="button-grid">
        <div th:each="type : ${vehicle.getIssueTypesForSystem()}">
            <button type="submit" name="issueType" th:value="${type}" class="type-btn">
                <span th:text="${vehicle.getIssueTypeDisplayName(type)}"></span>
            </button>
        </div>
    </div>
</form>

</body>
</html>
