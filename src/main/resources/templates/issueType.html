<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{issue_type.title}">Issue Type</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3 th:text="#{issue_type.title}">Select Issue Type</h3>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.customer}">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.vehicle}">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.location}">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>4</span></div>
            <div class="step-label" th:text="#{step.issue_type}">Issue Type</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label" th:text="#{step.severity}">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label" th:text="#{step.comments}">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label" th:text="#{step.review}">Review</div>
            <div class="progress-line"></div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/type" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">

    <div class="type-grid" th:switch="${vehicle.issueLocation}">
        <div th:case="engine" class="type-grid">
            <button type="submit" name="issueType" value="no_start" class="type-btn" th:text="#{engine.no_start}">Won't start</button>
            <button type="submit" name="issueType" value="check_engine" class="type-btn" th:text="#{engine.check_engine}">Check engine light</button>
            <button type="submit" name="issueType" value="rough_idle" class="type-btn" th:text="#{engine.rough_idle}">Rough idle</button>
            <button type="submit" name="issueType" value="loss_power" class="type-btn" th:text="#{engine.loss_power}">Loss of power</button>
            <button type="submit" name="issueType" value="knocking" class="type-btn" th:text="#{engine.knocking}">Knocking noise</button>
            <button type="submit" name="issueType" value="overheating" class="type-btn" th:text="#{engine.overheating}">Overheating</button>
            <button type="submit" name="issueType" value="oil_leak" class="type-btn" th:text="#{engine.oil_leak}">Oil leak</button>
            <button type="submit" name="issueType" value="smoke" class="type-btn" th:text="#{engine.smoke}">Smoke from exhaust</button>
        </div>
        <div th:case="transmission" class="type-grid">
            <button type="submit" name="issueType" value="slipping" class="type-btn" th:text="#{transmission.slipping}">Slipping gears</button>
            <button type="submit" name="issueType" value="rough_shifting" class="type-btn" th:text="#{transmission.rough_shifting}">Rough shifting</button>
            <button type="submit" name="issueType" value="delayed_engagement" class="type-btn" th:text="#{transmission.delayed_engagement}">Delayed engagement</button>
            <button type="submit" name="issueType" value="leaking" class="type-btn" th:text="#{transmission.leaking}">Fluid leak</button>
            <button type="submit" name="issueType" value="noise" class="type-btn" th:text="#{transmission.noise}">Unusual noise</button>
        </div>
        <div th:case="brakes" class="type-grid">
            <button type="submit" name="issueType" value="squeaking" class="type-btn" th:text="#{brakes.squeaking}">Squeaking noise</button>
            <button type="submit" name="issueType" value="grinding" class="type-btn" th:text="#{brakes.grinding}">Grinding noise</button>
            <button type="submit" name="issueType" value="soft_pedal" class="type-btn" th:text="#{brakes.soft_pedal}">Soft pedal</button>
            <button type="submit" name="issueType" value="vibration" class="type-btn" th:text="#{brakes.vibration}">Vibration when braking</button>
            <button type="submit" name="issueType" value="pulling" class="type-btn" th:text="#{brakes.pulling}">Pulling to one side</button>
        </div>
        <div th:case="electrical" class="type-grid">
            <button type="submit" name="issueType" value="battery" class="type-btn" th:text="#{electrical.battery}">Battery not holding charge</button>
            <button type="submit" name="issueType" value="alternator" class="type-btn" th:text="#{electrical.alternator}">Alternator issue</button>
            <button type="submit" name="issueType" value="lights" class="type-btn" th:text="#{electrical.lights}">Lights not working</button>
            <button type="submit" name="issueType" value="windows" class="type-btn" th:text="#{electrical.windows}">Power windows not working</button>
            <button type="submit" name="issueType" value="sensors" class="type-btn" th:text="#{electrical.sensors}">Sensor malfunction</button>
        </div>
        <div th:case="suspension" class="type-grid">
            <button type="submit" name="issueType" value="bumpy" class="type-btn" th:text="#{suspension.bumpy}">Rough ride</button>
            <button type="submit" name="issueType" value="noise" class="type-btn" th:text="#{suspension.noise}">Clunking noise</button>
            <button type="submit" name="issueType" value="steering" class="type-btn" th:text="#{suspension.steering}">Steering vibration</button>
            <button type="submit" name="issueType" value="pulling" class="type-btn" th:text="#{suspension.pulling}">Pulls to one side</button>
            <button type="submit" name="issueType" value="uneven" class="type-btn" th:text="#{suspension.uneven}">Uneven tire wear</button>
        </div>
        <div th:case="exhaust" class="type-grid">
            <button type="submit" name="issueType" value="loud" class="type-btn" th:text="#{exhaust.loud}">Loud noise</button>
            <button type="submit" name="issueType" value="smoke" class="type-btn" th:text="#{exhaust.smoke}">Excessive smoke</button>
            <button type="submit" name="issueType" value="smell" class="type-btn" th:text="#{exhaust.smell}">Gas smell</button>
            <button type="submit" name="issueType" value="rust" class="type-btn" th:text="#{exhaust.rust}">Rust or hole</button>
        </div>
        <div th:case="hvac" class="type-grid">
            <button type="submit" name="issueType" value="no_heat" class="type-btn" th:text="#{hvac.no_heat}">No heat</button>
            <button type="submit" name="issueType" value="no_ac" class="type-btn" th:text="#{hvac.no_ac}">No AC</button>
            <button type="submit" name="issueType" value="fan" class="type-btn" th:text="#{hvac.fan}">Fan not working</button>
            <button type="submit" name="issueType" value="smell" class="type-btn" th:text="#{hvac.smell}">Unusual smell</button>
        </div>
        <div th:case="exterior" class="type-grid">
            <button type="submit" name="issueType" value="dent" class="type-btn" th:text="#{exterior.dent}">Dent or scratch</button>
            <button type="submit" name="issueType" value="lights" class="type-btn" th:text="#{exterior.lights}">Light not working</button>
            <button type="submit" name="issueType" value="mirror" class="type-btn" th:text="#{exterior.mirror}">Mirror damaged</button>
            <button type="submit" name="issueType" value="windshield" class="type-btn" th:text="#{exterior.windshield}">Windshield crack</button>
        </div>
        <div th:case="interior" class="type-grid">
            <button type="submit" name="issueType" value="seat" class="type-btn" th:text="#{interior.seat}">Seat issue</button>
            <button type="submit" name="issueType" value="dashboard" class="type-btn" th:text="#{interior.dashboard}">Dashboard warning</button>
            <button type="submit" name="issueType" value="smell" class="type-btn" th:text="#{interior.smell}">Unusual smell</button>
            <button type="submit" name="issueType" value="buttons" class="type-btn" th:text="#{interior.buttons}">Controls not working</button>
        </div>
        <div th:case="other" class="type-grid">
            <button type="submit" name="issueType" value="other" class="type-btn" th:text="#{other.other}">Other issue</button>
        </div>
    </div>

    <div class="button-group">
        <button type="button" class="back-btn" onclick="history.back()" th:text="#{button.back}">Back</button>
    </div>
</form>

<style>
    .type-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        max-width: 600px;
        margin: 20px 0;
    }
    .type-btn {
        font-size: 16px;
        padding: 12px 24px;
        background-color: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
    }
    .type-btn:hover {
        background-color: #e0e0e0;
    }
</style>

</body>
</html>
