<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Your Information</title>
</head>
<body>

<h2>Review Your Information</h2>

<p><strong>First Name:</strong> <span th:text="${customer.fname}"></span></p>
<p><strong>Last Name:</strong> <span th:text="${customer.lname}"></span></p>
<p><strong>Email:</strong> <span th:text="${customer.email}"></span></p>
<p><strong>Phone:</strong> <span th:text="${customer.phone}"></span></p>
<p><strong>Address:</strong> <span th:text="${customer.address}"></span></p>

<p><strong>Make:</strong> <span th:text="${vehicle.make}"></span></p>
<p><strong>Model:</strong> <span th:text="${vehicle.model}"></span></p>
<p><strong>Year:</strong> <span th:text="${vehicle.year}"></span></p>
<p><strong>VIN:</strong> <span th:text="${vehicle.vin}"></span></p>
<p><strong>Issue:</strong> <span th:text="${vehicle.freeFormText}"></span></p>

<form action="/confirmationPage" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">

    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="freeFormText" th:value="${vehicle.freeFormText}">

    <button type="submit">Confirm Submission</button>
</form>

</body>
</html>
