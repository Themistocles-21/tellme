<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Submitted</title>
    <style>
        .home-btn {
            font-size: 16px;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .home-btn:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<p><strong>Confirm:</strong> <span th:text="${confirmationMsg}"></span></p>
<hr>

<div style="font-family: monospace; font-size: 14px; margin: 15px 0; padding: 8px; background-color: #f5f5f5; border-radius: 4px;">
    [ Customer Info ] --- [ Vehicle Info ] --- [ Structured Diagnosis ] --- [ Extra Comments ] --- [ <span style="color: red; font-weight: bold;">Confirm Submission</span> ]
</div>
<hr>

<p><strong>Order Number:</strong> <span th:text="${orderNumber}"></span></p>
<p><strong>Date & Time:</strong> <span th:text="${dateTime}"></span></p>
<p><strong>Issue Summary:</strong> <span th:text="${issueSummary}"></span></p>
<p><strong>Spam reminder:</strong> <span th:text="${msgToReadEmail}"></span></p>
<p><strong>Email:</strong> <span th:text="${email}"></span></p>

<br/>

<form action="/home" method="get">
    <button type="submit" class="home-btn">Return Home</button>
</form>

</body>
</html>
