<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Submitted</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Symptom</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Specific</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Complete</div>
        </div>
    </div>
</div>
<hr>

<div class="success-box">
    <h2>Order Successfully Submitted!</h2>
    <p th:text="${confirmationMsg}"></p>
</div>

<p><strong>Order Number:</strong> <span th:text="${orderNumber}"></span></p>
<p><strong>Date & Time:</strong> <span th:text="${dateTime}"></span></p>
<p><strong>Issue Summary:</strong> <span th:text="${issueSummary}"></span></p>
<p><strong>Spam reminder:</strong> <span th:text="${msgToReadEmail}"></span></p>
<p><strong>Email:</strong> <span th:text="${email}"></span></p>

<br/>

<form action="/home" method="get">
    <button type="submit" class="home-btn">Return Home</button>
</form>

</body>
</html>
