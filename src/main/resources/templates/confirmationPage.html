<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Submitted</title>
    <style>
        .home-btn {
            font-size: 16px;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .home-btn:hover {
            background-color: #e0e0e0;
        }
        .success-box {
            background-color: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .progress-container {
            margin: 20px 0 30px 0;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
        }
        .step-circle {
            width: 32px;
            height: 32px;
            background-color: #ccc;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .step.completed .step-circle {
            background-color: #28a745;
        }
        .step.completed .step-circle::after {
            content: "✓";
        }
        .step.current .step-circle {
            background-color: #007bff;
        }
        .step.pending .step-circle {
            background-color: #e0e0e0;
        }
        .step.pending .step-circle span {
            color: #999;
        }
        .step-label {
            font-size: 11px;
            color: #666;
        }
        .step.completed .step-label {
            color: #28a745;
            font-weight: bold;
        }
        .step.current .step-label {
            color: #007bff;
            font-weight: bold;
        }
        .step.pending .step-label {
            color: #999;
        }
        .progress-line {
            position: absolute;
            top: 16px;
            left: 50%;
            width: 100%;
            height: 2px;
            background-color: #e0e0e0;
            z-index: -1;
        }
        .step:last-child .progress-line {
            display: none;
        }
        .step.completed + .step .progress-line {
            background-color: #28a745;
        }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Symptom</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Specific</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Complete</div>
        </div>
    </div>
</div>
<hr>

<div class="success-box">
    <h2>✓ Order Successfully Submitted!</h2>
    <p th:text="${confirmationMsg}"></p>
</div>

<p><strong>Order Number:</strong> <span th:text="${orderNumber}"></span></p>
<p><strong>Date & Time:</strong> <span th:text="${dateTime}"></span></p>
<p><strong>Issue Summary:</strong> <span th:text="${issueSummary}"></span></p>
<p><strong>Spam reminder:</strong> <span th:text="${msgToReadEmail}"></span></p>
<p><strong>Email:</strong> <span th:text="${email}"></span></p>

<br/>

<form action="/home" method="get">
    <button type="submit" class="home-btn">Return Home</button>
</form>

</body>
</html>
