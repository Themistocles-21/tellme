<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{confirmation.title}">Order Submitted</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.customer}">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.vehicle}">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.location}">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.issue_type}">Issue Type</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.severity}">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.comments}">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.review}">Review</div>
            <div class="progress-line"></div>
        </div>
    </div>
</div>
<hr>

<div class="success-box">
    <h2 th:text="#{confirmation.message}">Order Submitted</h2>
    <p th:text="${confirmationMsg}"></p>
</div>

<p><strong th:text="#{confirmation.order_number}">Order Number:</strong> <span th:text="${orderNumber}"></span></p>
<p><strong th:text="#{confirmation.date_time}">Date & Time:</strong> <span th:text="${dateTime}"></span></p>
<p><strong th:text="#{confirmation.summary}">Issue Summary:</strong> <span th:text="${issueSummary}"></span></p>

<div th:if="${originalText != null and originalText != ''}">
    <p><strong>Original Comments:</strong> <span th:text="${originalText}"></span></p>
    <p><strong>Translated Comments:</strong> <span th:text="${translatedText}"></span></p>
</div>

<p><strong th:text="#{confirmation.email}">Email:</strong> <span th:text="${email}"></span></p>
<p><strong th:text="#{confirmation.spam}"></strong></p>

<br/>

<form action="/home" method="get">
    <button type="submit" class="home-btn" th:text="#{button.home}">Return Home</button>
</form>

</body>
</html>
