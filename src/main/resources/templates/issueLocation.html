<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 3: Where is the problem?</title>
    <style>
        .location-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 30px 0;
        }
        .location-btn {
            font-size: 16px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .location-btn:hover {
            background-color: #e0e0e0;
        }
        hr {
            margin: 15px 0;
        }
        .progress-container {
            margin: 20px 0 30px 0;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
        }
        .step-circle {
            width: 32px;
            height: 32px;
            background-color: #ccc;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .step.completed .step-circle {
            background-color: #28a745;
        }
        .step.completed .step-circle::after {
            content: "✓";
        }
        .step.current .step-circle {
            background-color: #007bff;
        }
        .step.pending .step-circle {
            background-color: #e0e0e0;
        }
        .step.pending .step-circle span {
            color: #999;
        }
        .step-label {
            font-size: 11px;
            color: #666;
        }
        .step.completed .step-label {
            color: #28a745;
            font-weight: bold;
        }
        .step.current .step-label {
            color: #007bff;
            font-weight: bold;
        }
        .step.pending .step-label {
            color: #999;
        }
        .progress-line {
            position: absolute;
            top: 16px;
            left: 50%;
            width: 100%;
            height: 2px;
            background-color: #e0e0e0;
            z-index: -1;
        }
        .step:last-child .progress-line {
            display: none;
        }
        .step.completed + .step .progress-line {
            background-color: #28a745;
        }
    </style>
</head>
<body>

<h3>Step 3 of 9: Where is the problem located?</h3>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>3</span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>4</span></div>
            <div class="step-label">Symptom</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label">Specific</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>8</span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>9</span></div>
            <div class="step-label">Complete</div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/location" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">

    <div class="location-grid">
        <button type="submit" name="issueLocation" value="front" class="location-btn">Front of vehicle</button>
        <button type="submit" name="issueLocation" value="rear" class="location-btn">Rear of vehicle</button>
        <button type="submit" name="issueLocation" value="left_side" class="location-btn">Left side (driver side)</button>
        <button type="submit" name="issueLocation" value="right_side" class="location-btn">Right side (passenger side)</button>
        <button type="submit" name="issueLocation" value="inside" class="location-btn">Inside the cabin</button>
        <button type="submit" name="issueLocation" value="underneath" class="location-btn">Underneath the vehicle</button>
        <button type="submit" name="issueLocation" value="engine_bay" class="location-btn">Under the hood / engine bay</button>
        <button type="submit" name="issueLocation" value="multiple" class="location-btn">Multiple places</button>
        <button type="submit" name="issueLocation" value="unsure" class="location-btn">Not sure</button>
    </div>
</form>

</body>
</html>
