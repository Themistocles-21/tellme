<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 1: Where is the problem?</title>
    <style>
        .location-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 30px 0;
        }
        .location-btn {
            font-size: 16px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .location-btn:hover {
            background-color: #e0e0e0;
        }
        hr { margin: 15px 0; }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .progress-current { color: red; font-weight: bold; }
        .progress-step { color: #999; }
    </style>
</head>
<body>

<h3>Step 1 of 5: Where is the problem located?</h3>
<hr>

<div class="progress-bar">
    [ Customer ] --- [ Vehicle ] --- [ <span class="progress-current">1. Location</span> ] --- [ 2. Symptom ] --- [ 3. Specific ] --- [ 4. Severity ] --- [ 5. Comments ] --- [ Review ]
</div>
<hr>

<form action="/vehicle/issue/location" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">

    <div class="location-grid">
        <button type="submit" name="issueLocation" value="front" class="location-btn">Front of vehicle</button>
        <button type="submit" name="issueLocation" value="rear" class="location-btn">Rear of vehicle</button>
        <button type="submit" name="issueLocation" value="left_side" class="location-btn">Left side (driver side)</button>
        <button type="submit" name="issueLocation" value="right_side" class="location-btn">Right side (passenger side)</button>
        <button type="submit" name="issueLocation" value="inside" class="location-btn">Inside the cabin</button>
        <button type="submit" name="issueLocation" value="underneath" class="location-btn">Underneath the vehicle</button>
        <button type="submit" name="issueLocation" value="engine_bay" class="location-btn">Under the hood / engine bay</button>
        <button type="submit" name="issueLocation" value="multiple" class="location-btn">Multiple places</button>
        <button type="submit" name="issueLocation" value="unsure" class="location-btn">Not sure</button>
    </div>
</form>

</body>
</html>
