<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{location.title}">Issue Location</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3 th:text="#{location.title}">Select Issue Location</h3>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.customer}">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.vehicle}">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>3</span></div>
            <div class="step-label" th:text="#{step.location}">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>4</span></div>
            <div class="step-label" th:text="#{step.issue_type}">Issue Type</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label" th:text="#{step.severity}">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label" th:text="#{step.comments}">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label" th:text="#{step.review}">Review</div>
            <div class="progress-line"></div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/location" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">

    <div class="location-grid">
        <button type="submit" name="issueLocation" value="engine" class="location-btn" th:text="#{location.engine}">Engine</button>
        <button type="submit" name="issueLocation" value="transmission" class="location-btn" th:text="#{location.transmission}">Transmission</button>
        <button type="submit" name="issueLocation" value="brakes" class="location-btn" th:text="#{location.brakes}">Brakes</button>
        <button type="submit" name="issueLocation" value="electrical" class="location-btn" th:text="#{location.electrical}">Electrical / Battery</button>
        <button type="submit" name="issueLocation" value="suspension" class="location-btn" th:text="#{location.suspension}">Suspension / Steering</button>
        <button type="submit" name="issueLocation" value="exhaust" class="location-btn" th:text="#{location.exhaust}">Exhaust</button>
        <button type="submit" name="issueLocation" value="hvac" class="location-btn" th:text="#{location.hvac}">HVAC</button>
        <button type="submit" name="issueLocation" value="exterior" class="location-btn" th:text="#{location.exterior}">Body / Exterior</button>
        <button type="submit" name="issueLocation" value="interior" class="location-btn" th:text="#{location.interior}">Interior</button>
        <button type="submit" name="issueLocation" value="other" class="location-btn" th:text="#{location.other}">Other</button>
    </div>

    <div class="button-group">
        <button type="button" class="back-btn" onclick="history.back()" th:text="#{button.back}">Back</button>
    </div>
</form>

</body>
</html>
