<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 3: Issue Location</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3>Step 3 of 7: Select the issue location</h3>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>3</span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>4</span></div>
            <div class="step-label">Issue Type</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/location" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">

    <div class="location-grid">
        <button type="submit" name="issueLocation" value="engine" class="location-btn">Engine</button>
        <button type="submit" name="issueLocation" value="transmission" class="location-btn">Transmission</button>
        <button type="submit" name="issueLocation" value="brakes" class="location-btn">Brakes</button>
        <button type="submit" name="issueLocation" value="electrical" class="location-btn">Electrical / Battery</button>
        <button type="submit" name="issueLocation" value="suspension" class="location-btn">Suspension / Steering</button>
        <button type="submit" name="issueLocation" value="exhaust" class="location-btn">Exhaust</button>
        <button type="submit" name="issueLocation" value="hvac" class="location-btn">HVAC</button>
        <button type="submit" name="issueLocation" value="exterior" class="location-btn">Body / Exterior</button>
        <button type="submit" name="issueLocation" value="interior" class="location-btn">Interior</button>
        <button type="submit" name="issueLocation" value="other" class="location-btn">Other</button>
    </div>
</form>

</body>
</html>
