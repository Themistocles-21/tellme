<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 2: What do you notice?</title>
    <style>
        .symptom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 30px 0;
        }
        .symptom-btn {
            font-size: 16px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .symptom-btn:hover {
            background-color: #e0e0e0;
        }
        .selected-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
        hr { margin: 15px 0; }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .progress-current { color: red; font-weight: bold; }
        .progress-step { color: #999; }
    </style>
</head>
<body>

<h3>Step 2 of 5: What do you notice?</h3>
<div class="selected-info">
    Location: <strong th:text="${vehicle.issueLocation}"></strong>
</div>
<hr>

<div class="progress-bar">
    [ Customer ] --- [ Vehicle ] --- [ <span class="progress-step">1. Location</span> ] --- [ <span class="progress-current">2. Symptom</span> ] --- [ 3. Specific ] --- [ 4. Severity ] --- [ 5. Comments ] --- [ Review ]
</div>
<hr>

<form action="/vehicle/issue/symptom" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">

    <div class="symptom-grid">
        <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (squeak, rattle, knock, hum)</button>
        <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light is on</button>
        <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
        <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue (power, starting, shifting)</button>
        <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell</button>
        <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
        <button type="submit" name="issueSymptom" value="climate" class="symptom-btn">Climate control (heat, AC, fan)</button>
        <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (lights, windows, battery)</button>
        <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (dent, crack, scratch)</button>
        <button type="submit" name="issueSymptom" value="other" class="symptom-btn">Other / Not sure</button>
    </div>
</form>

</body>
</html>
