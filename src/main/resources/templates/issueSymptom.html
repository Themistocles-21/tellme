<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 4: What do you notice?</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3>Step 4 of 9: What do you notice?</h3>
<div class="selected-info">
    Location: <strong th:text="${vehicle.issueLocation}"></strong>
</div>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>4</span></div>
            <div class="step-label">Symptom</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label">Specific</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>8</span></div>
            <div class="step-label">Review</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>9</span></div>
            <div class="step-label">Complete</div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/symptom" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">

    <div class="symptom-grid" th:switch="${vehicle.issueLocation}">
        <div th:case="front">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (squeak, rattle, knock)</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light is on</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak (oil, coolant)</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue (power, starting)</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell (gas, burning)</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (dent, crack)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (lights, battery)</button>
        </div>
        <div th:case="rear">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (rattle, hum)</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak (exhaust, fuel)</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell (exhaust, gas)</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (dent, crack, lights)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (taillights, backup camera)</button>
        </div>
        <div th:case="left_side">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (squeak, rattle)</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (dent, scratch, mirror)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (window, lock, mirror)</button>
        </div>
        <div th:case="right_side">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (squeak, rattle)</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (dent, scratch, mirror)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (window, lock, mirror)</button>
        </div>
        <div th:case="inside">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (rattle, squeak, click)</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light on dashboard</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell (musty, burning)</button>
            <button type="submit" name="issueSymptom" value="climate" class="symptom-btn">Climate control (heat, AC, fan)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (windows, radio, lights)</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (seat, trim, carpet)</button>
        </div>
        <div th:case="underneath">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (clunk, scrape, rattle)</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak (oil, coolant, fuel)</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue (shifting, vibration)</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell (gas, burning)</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (exhaust, shield, rust)</button>
        </div>
        <div th:case="engine_bay">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise (knock, tick, squeal)</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light on</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak (oil, coolant, fuel)</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue (power, starting, overheating)</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell (burning oil, gas, sweet)</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage (crack, rust, loose parts)</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical (battery, alternator, wiring)</button>
        </div>
        <div th:case="multiple">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light is on</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="climate" class="symptom-btn">Climate control</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage</button>
        </div>
        <div th:case="unsure">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light is on</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="climate" class="symptom-btn">Climate control</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage</button>
        </div>
        <div th:case="*">
            <button type="submit" name="issueSymptom" value="noise" class="symptom-btn">Noise</button>
            <button type="submit" name="issueSymptom" value="warning_light" class="symptom-btn">Warning light is on</button>
            <button type="submit" name="issueSymptom" value="leak" class="symptom-btn">Fluid leak</button>
            <button type="submit" name="issueSymptom" value="performance" class="symptom-btn">Performance issue</button>
            <button type="submit" name="issueSymptom" value="smell" class="symptom-btn">Unusual smell</button>
            <button type="submit" name="issueSymptom" value="vibration" class="symptom-btn">Vibration or shaking</button>
            <button type="submit" name="issueSymptom" value="climate" class="symptom-btn">Climate control</button>
            <button type="submit" name="issueSymptom" value="electrical" class="symptom-btn">Electrical</button>
            <button type="submit" name="issueSymptom" value="visual" class="symptom-btn">Visual damage</button>
        </div>
    </div>
</form>

</body>
</html>
