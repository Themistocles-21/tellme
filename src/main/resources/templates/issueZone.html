<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Where is the issue?</title>
    <style>
        .zone-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: 30px 0;
        }
        .zone-btn {
            font-size: 20px;
            font-weight: bold;
            padding: 30px 20px;
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .zone-btn:hover {
            background-color: #e0e0e0;
            transform: scale(1.02);
            border-color: #999;
        }
        .zone-desc {
            font-size: 12px;
            font-weight: normal;
            margin-top: 8px;
            color: #666;
        }
        h3 {
            margin-bottom: 5px;
        }
        hr {
            margin: 15px 0 25px 0;
        }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h3>Where is the issue located?</h3>
<hr>

<div class="progress-bar">
    [ Customer Info ] --- [ Vehicle Info ] --- [ Diagnosis 1/4 ] --- [ Details ] --- [ Confirm ] --- [ Complete ]
</div>
<hr>

<form action="/vehicle/issue/zone" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">

    <div class="zone-grid">
        <button type="submit" name="issueZone" value="front" class="zone-btn">
            FRONT
            <div class="zone-desc">Engine, radiator, headlights, front bumper</div>
        </button>
        <button type="submit" name="issueZone" value="rear" class="zone-btn">
            REAR
            <div class="zone-desc">Trunk, exhaust, taillights, rear bumper</div>
        </button>
        <button type="submit" name="issueZone" value="side" class="zone-btn">
            SIDE
            <div class="zone-desc">Doors, mirrors, windows, rocker panels</div>
        </button>
        <button type="submit" name="issueZone" value="interior" class="zone-btn">
            INTERIOR
            <div class="zone-desc">Seats, dashboard, AC, smells, noises inside</div>
        </button>
        <button type="submit" name="issueZone" value="top" class="zone-btn">
            TOP / ROOF
            <div class="zone-desc">Headliner, sunroof, windshield, roof</div>
        </button>
        <button type="submit" name="issueZone" value="bottom" class="zone-btn">
            BOTTOM / UNDERCARRIAGE
            <div class="zone-desc">Under engine, transmission, exhaust, suspension</div>
        </button>
    </div>
</form>

</body>
</html>
