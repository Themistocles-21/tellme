<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Step 4: How severe?</title>
    <style>
        .severity-buttons {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .severity-btn {
            font-size: 16px;
            padding: 20px 30px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
        }
        .severity-btn:hover {
            background-color: #e0e0e0;
        }
        .selected-info {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
        hr { margin: 15px 0; }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .progress-current { color: red; font-weight: bold; }
        .progress-step { color: #999; }
    </style>
</head>
<body>

<h3>Step 4 of 5: How severe is the issue?</h3>
<div class="selected-info">
    Location: <strong th:text="${vehicle.issueLocation}"></strong><br/>
    Symptom: <strong th:text="${vehicle.issueSymptom}"></strong><br/>
    Specific: <strong th:text="${vehicle.issueSpecific}"></strong>
</div>
<hr>

<div class="progress-bar">
    [ Customer ] --- [ Vehicle ] --- [ <span class="progress-step">1. Location</span> ] --- [ <span class="progress-step">2. Symptom</span> ] --- [ <span class="progress-step">3. Specific</span> ] --- [ <span class="progress-current">4. Severity</span> ] --- [ 5. Comments ] --- [ Review ]
</div>
<hr>

<form action="/vehicle/issue/severity" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">
    <input type="hidden" name="issueSymptom" th:value="${vehicle.issueSymptom}">
    <input type="hidden" name="issueSpecific" th:value="${vehicle.issueSpecific}">

    <div class="severity-buttons">
        <button type="submit" name="severity" value="mild" class="severity-btn">Mild - Annoying but can wait</button>
        <button type="submit" name="severity" value="moderate" class="severity-btn">Moderate - Need attention soon</button>
        <button type="submit" name="severity" value="severe" class="severity-btn">Severe - Drivable but concerning</button>
        <button type="submit" name="severity" value="emergency" class="severity-btn">Emergency - Not safe to drive</button>
    </div>
</form>

</body>
</html>
