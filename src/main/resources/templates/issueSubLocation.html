<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exactly where?</title>
    <style>
        .sublocation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: 30px 0;
        }
        .sub-btn {
            font-size: 18px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sub-btn:hover {
            background-color: #e0e0e0;
        }
        hr {
            margin: 15px 0 25px 0;
        }
        .progress-bar {
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .selected-zone {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<h3>Exactly where?</h3>
<div class="selected-zone">
    Selected zone: <strong th:text="${vehicle.issueZone}"></strong>
</div>
<hr>

<div class="progress-bar">
    [ Customer Info ] --- [ Vehicle Info ] --- [ Diagnosis 2/4 ] --- [ Details ] --- [ Confirm ] --- [ Complete ]
</div>
<hr>

<form action="/vehicle/issue/sublocation" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueZone" th:value="${vehicle.issueZone}">

    <div class="sublocation-grid">
        <div th:each="subLoc : ${vehicle.getSubLocationsForZone()}">
            <button type="submit" name="issueSubLocation" th:value="${subLoc}" class="sub-btn">
                <span th:text="${vehicle.getSubLocationDisplayName(subLoc)}">Location</span>
            </button>
        </div>
    </div>
</form>

</body>
</html>
