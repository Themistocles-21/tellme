<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Information</title>
    <style>
        .language-buttons {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
        }
        .lang-btn {
            font-size: 16px;
            padding: 8px 20px;
            margin: 0 10px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: white;
            border-radius: 4px;
        }
        .lang-btn:hover {
            background-color: #ddd;
        }
        hr {
            margin: 10px 0 20px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            width: 250px;
        }
        .next-btn {
            font-size: 18px;
            padding: 10px 30px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .next-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h3>CSCD488 Project</h3>
<h4>Team #4: Aaron Oehler, Derik Little, Danish Wahidi</h4>
<hr>

<div class="language-buttons">
    <button type="button" class="lang-btn" onclick="setLanguage('en')">English</button>
    <button type="button" class="lang-btn" onclick="setLanguage('fa')">Farsi</button>
    <button type="button" class="lang-btn" onclick="setLanguage('ru')">Russian</button>
</div>

<form action="/register" method="post" id="customerForm">
    <input type="hidden" name="language" id="language" value="en">

    <div class="form-group">
        <label for="fname">First name :</label>
        <input type="text" name="fname" id="fname" required/>
    </div>

    <div class="form-group">
        <label for="lname">Last name :</label>
        <input type="text" name="lname" id="lname" required/>
    </div>

    <div class="form-group">
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" required/>
    </div>

    <div class="form-group">
        <label for="phone">Phone :</label>
        <input type="text" name="phone" id="phone" required/>
    </div>

    <div class="form-group">
        <label for="address">Address :</label>
        <input type="text" name="address" id="address" required/>
    </div>

    <button type="submit" class="next-btn">Next</button>
</form>

<script>
    function setLanguage(lang) {
        document.getElementById('language').value = lang;
    }
</script>

</body>
</html>
