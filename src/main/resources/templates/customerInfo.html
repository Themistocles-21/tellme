<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Information</title>
    <style>
        .language-buttons {
            text-align: left;
            margin: 20px 0;
            padding: 10px 0;
        }
        .lang-btn {
            font-size: 16px;
            padding: 8px 20px;
            margin: 0 10px 0 0;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f0f0f0;
            color: #333;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .lang-btn:hover {
            background-color: #e0e0e0;
        }
        hr {
            margin: 10px 0 20px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .next-btn {
            font-size: 16px;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .next-btn:hover {
            background-color: #e0e0e0;
        }
        .progress-container {
            margin: 15px 0 25px 0;
            padding: 10px;
            background-color: #f8f8f8;
            border-radius: 4px;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .step {
            font-size: 14px;
            padding: 5px 10px;
            color: #888;
            background-color: #e0e0e0;
            border-radius: 4px;
        }
        .step.active {
            color: #fff;
            background-color: #d32f2f;
            font-weight: bold;
        }
        .separator {
            color: #ccc;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h3>CSCD488 Project</h3>
<h4>Team #4: Aaron Oehler, Derik Little, Danish Wahidi</h4>
<hr>

<!-- Progress Bar -->
<div class="progress-container">
    <div class="progress-steps">
        <span class="step active">Customer Info</span>
        <span class="separator">→</span>
        <span class="step">Vehicle Info</span>
        <span class="separator">→</span>
        <span class="step">Structured Diagnosis</span>
        <span class="separator">→</span>
        <span class="step">Extra Comments</span>
        <span class="separator">→</span>
        <span class="step">Confirm Submission</span>
    </div>
</div>

<div class="language-buttons">
    <button type="button" class="lang-btn">English</button>
    <button type="button" class="lang-btn">فارسی</button>
    <button type="button" class="lang-btn">Русский</button>
</div>

<form action="/register" method="post" id="customerForm">
    <input type="hidden" name="language" id="language" value="en">

    <div class="form-group">
        <label for="fname">First name :</label>
        <input type="text" name="fname" id="fname" required/>
    </div>

    <div class="form-group">
        <label for="lname">Last name :</label>
        <input type="text" name="lname" id="lname" required/>
    </div>

    <div class="form-group">
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" required/>
    </div>

    <div class="form-group">
        <label for="phone">Phone :</label>
        <input type="text" name="phone" id="phone" required/>
    </div>

    <div class="form-group">
        <label for="address">Address :</label>
        <input type="text" name="address" id="address" required/>
    </div>

    <button type="submit" class="next-btn">Next</button>
</form>

</body>
</html>
