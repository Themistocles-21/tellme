<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Vehicle Information</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .next-btn {
            font-size: 16px;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .next-btn:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<h3>Vehicle Information</h3>
<hr>

<form action="/vehicle/register" method="post">

    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">

    <div class="form-group">
        <label for="make">Make :</label>
        <input type="text" name="make" id="make" required/>
    </div>

    <div class="form-group">
        <label for="model">Model :</label>
        <input type="text" name="model" id="model" required/>
    </div>

    <div class="form-group">
        <label for="year">Year :</label>
        <input type="text" name="year" id="year" required/>
    </div>

    <div class="form-group">
        <label for="vin">VIN :</label>
        <input type="text" name="vin" id="vin" required/>
    </div>

    <button type="submit" class="next-btn">Next</button>

</form>

</body>
</html>
