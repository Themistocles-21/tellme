<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="progressBar(currentStep)" class="progress-container">
    <div class="progress-steps">
        <span th:class="${currentStep == 'customer' ? 'step active' : 'step'}">Customer Info</span>
        <span class="separator">→</span>
        <span th:class="${currentStep == 'vehicle' ? 'step active' : 'step'}">Vehicle Info</span>
        <span class="separator">→</span>
        <span th:class="${currentStep == 'diagnosis' ? 'step active' : 'step'}">Structured Diagnosis</span>
        <span class="separator">→</span>
        <span th:class="${currentStep == 'comments' ? 'step active' : 'step'}">Extra Comments</span>
        <span class="separator">→</span>
        <span th:class="${currentStep == 'confirm' ? 'step active' : 'step'}">Confirm Submission</span>
    </div>
</div>

<style>
    .progress-container {
        margin: 15px 0 25px 0;
        padding: 10px;
        background-color: #f8f8f8;
        border-radius: 4px;
    }
    .progress-steps {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
    }
    .step {
        font-size: 14px;
        padding: 5px 10px;
        color: #888;
        background-color: #e0e0e0;
        border-radius: 4px;
    }
    .step.active {
        color: #fff;
        background-color: #d32f2f;
        font-weight: bold;
    }
    .separator {
        color: #ccc;
        font-size: 16px;
    }
</style>
</body>
</html>
