<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{severity.title}">Issue Severity</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h3 th:text="#{severity.title}">How severe is the issue?</h3>
<hr>

<div class="progress-container">
    <div class="progress-steps">
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.customer}">Customer</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.vehicle}">Vehicle</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.location}">Location</div>
            <div class="progress-line"></div>
        </div>
        <div class="step completed">
            <div class="step-circle"><span></span></div>
            <div class="step-label" th:text="#{step.issue_type}">Issue Type</div>
            <div class="progress-line"></div>
        </div>
        <div class="step current">
            <div class="step-circle"><span>5</span></div>
            <div class="step-label" th:text="#{step.severity}">Severity</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>6</span></div>
            <div class="step-label" th:text="#{step.comments}">Comments</div>
            <div class="progress-line"></div>
        </div>
        <div class="step pending">
            <div class="step-circle"><span>7</span></div>
            <div class="step-label" th:text="#{step.review}">Review</div>
            <div class="progress-line"></div>
        </div>
    </div>
</div>
<hr>

<form action="/vehicle/issue/severity" method="post">
    <input type="hidden" name="fname" th:value="${customer.fname}">
    <input type="hidden" name="lname" th:value="${customer.lname}">
    <input type="hidden" name="email" th:value="${customer.email}">
    <input type="hidden" name="phone" th:value="${customer.phone}">
    <input type="hidden" name="address" th:value="${customer.address}">
    <input type="hidden" name="language" th:value="${customer.language}">
    <input type="hidden" name="make" th:value="${vehicle.make}">
    <input type="hidden" name="model" th:value="${vehicle.model}">
    <input type="hidden" name="year" th:value="${vehicle.year}">
    <input type="hidden" name="vin" th:value="${vehicle.vin}">
    <input type="hidden" name="issueLocation" th:value="${vehicle.issueLocation}">
    <input type="hidden" name="issueType" th:value="${vehicle.issueType}">

    <div class="severity-buttons">
        <button type="submit" name="severity" value="mild" class="severity-btn" th:text="#{severity.mild}">Mild</button>
        <button type="submit" name="severity" value="moderate" class="severity-btn" th:text="#{severity.moderate}">Moderate</button>
        <button type="submit" name="severity" value="severe" class="severity-btn" th:text="#{severity.severe}">Severe</button>
        <button type="submit" name="severity" value="emergency" class="severity-btn" th:text="#{severity.emergency}">Emergency</button>
    </div>
</form>

</body>
</html>
